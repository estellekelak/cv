infos:
  nom: "Estelle TAKAOKA"
  photo: "assets/images/Copilot_20260326_053622.png"
  location: "🌍 Conflans-Sainte-Honorine, France"
  poste_actuel: "Formatrice consultante"
  bio: >
    Je travaille depuis plusieurs années à la croisée de la pédagogie, des financements, du mécénat, de la communication et du numérique. Ce parcours hybride m’a appris à naviguer entre des logiques très différentes, à comprendre les besoins de chaque acteur et à construire des projets qui tiennent dans la durée.
    Quand j’arrive dans une organisation, je commence par observer : les dynamiques internes, les contraintes, les zones de friction, les ressources disponibles. Petit à petit, je clarifie, je structure, je relie. J’apporte des méthodes, des outils et une vision d’ensemble qui permettent aux équipes d’avancer plus sereinement et aux projets de gagner en cohérence.
